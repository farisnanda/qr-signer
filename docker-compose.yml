version: '3.8'

services:
  signer:
    build: .
    container_name: qr-signer
    ports:
      - "3002:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:signer2026@signer-db:5432/qr_signer
      - NEXTAUTH_SECRET=c456f6a85b7765b23a44a49a070b85b613bea62cf501f3b58eee750c979cdfc0
      - NEXTAUTH_URL=https://apps.bkd.jatimprov.go.id/qr-signer
      - GOTENBERG_URL=http://gotenberg-signer:3000
      # Base URL BSrE Esign Client Service (akses via IP VPS yang di-whitelist).
      # Ini environment DEV; ganti ke URL produksi saat go-live.
      # Kredensial username/password TIDAK di sini (transien saat TTE).
      - BSRE_BASE_URL=https://esign-dev.jatimprov.go.id
      # Minio Object Storage (S3-compatible) untuk menyimpan SK hasil.
      # PENTING: MINIO_ACCESS_KEY & MINIO_SECRET_KEY harus diset via .env file terpisah
      # atau docker secrets, JANGAN di-commit. Format: siasn.bdk.jatimprov.go.id:9000
      - MINIO_ENDPOINT=siasn.bdk.jatimprov.go.id
      - MINIO_PORT=9000
      - MINIO_BUCKET=qr-signer-sk
      # MINIO_ACCESS_KEY=<user>  (set via docker run -e atau .env)
      # MINIO_SECRET_KEY=<pass>  (set via docker run -e atau .env)
    volumes:
      - signer-uploads:/app/private/uploads
    depends_on:
      - signer-db
      - gotenberg-signer
    networks:
      - network-sharing
    restart: unless-stopped

  signer-db:
    image: postgres:16-alpine
    container_name: signer-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=signer2026
      - POSTGRES_DB=qr_signer
    volumes:
      - signer-db-data:/var/lib/postgresql/data
    networks:
      - network-sharing
    restart: unless-stopped

  gotenberg-signer:
    build:
      context: .
      dockerfile: Dockerfile.gotenberg
    container_name: gotenberg-signer
    ports:
      - "3000:3000"
    networks:
      - network-sharing
    restart: unless-stopped

networks:
  network-sharing:
    external: true

volumes:
  signer-db-data:
  signer-uploads:
